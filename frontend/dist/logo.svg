<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Teal glow ring behind C -->
  <circle cx="32" cy="32" r="20" stroke="#14b8a6" stroke-width="2" stroke-dasharray="4 3" opacity="0.35"/>

  <!-- Bold C letter -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Geist', 'Inter', system-ui, sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#cgrad)"
    letter-spacing="-1"
  >C</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="cgrad" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>