spring:
  threads:
    virtual:
      enabled: ${USE_VIRTUAL_THREADS:true}
  config:
    import: optional:file:./.env[.properties],optional:file:/etc/secrets/.env[.properties]
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  application:
    name: ${APP_NAME:DOC-SERVICE}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-little-tooth-aietft4j-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_V3CtPOF9KSuh}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Kolkata}
    dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${OAUTH_REDIRECT_BASE:http://localhost:5173/careerhub}/login/oauth2/code/{registrationId}
            scope:
              - profile
              - email
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            redirect-uri: ${OAUTH_REDIRECT_BASE:http://localhost:5173/careerhub}/login/oauth2/code/{registrationId}
            scope:
              - read:user
              - user:email

logging:
  level:
    root: ${LOG_LEVEL_ROOT:TRACE}
    com.codeshare: ${LOG_LEVEL_APP:TRACE}

server:
  port: ${PORT:5001}

google:
  clientId: ${GOOGLE_CLIENT_ID:714053477959-f413v63lor5gt8u2r5vejdhqp0rr4r36.apps.googleusercontent.com}
  clientSecret: ${GOOGLE_CLIENT_SECRET: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}

github:
  clientId: ${GITHUB_CLIENT_ID:}
  clientSecret: ${GITHUB_CLIENT_SECRET:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

oauth:
  success-redirect: ${OAUTH_SUCCESS_REDIRECT:http://localhost:5173}
  failure-redirect: ${OAUTH_FAILURE_REDIRECT:http://localhost:5173/login}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:your-256-bit-secret-key-must-be-at-least-32-characters-long}
    expiry-ms: ${AUTH_JWT_EXPIRY_MS:3600000}
  session:
    expiry-ms: ${AUTH_SESSION_EXPIRY_MS:2592000000}
  cookie:
    name: ${AUTH_COOKIE_NAME:ACCESS_TOKEN}
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    path: ${AUTH_COOKIE_PATH:/}
